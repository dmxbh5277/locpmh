<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lọc Dữ Liệu PMH</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0ea5e9; /* Cyan tươi hiện đại */
            --primary-hover: #0284c7;
            --primary-light: #f0f9ff;
            --bg-body: #f8fafc; /* Màu nền xám nhạt chuẩn Dashboard */
            --bg-card: #ffffff;
            --text-main: #0f172a; /* Slate đậm sang trọng */
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981; /* Xanh lục thống kê */
            --success-bg: #f0fdf4;
            --danger-color: #ef4444;
            --danger-bg: #fef2f2;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-active: 0 10px 15px -3px rgba(14, 165, 233, 0.1), 0 4px 6px -4px rgba(14, 165, 233, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-active);
            border: 1px solid rgba(14, 165, 233, 0.08);
        }

        /* Tiêu đề kiểu Dashboard */
        .dashboard-title {
            text-align: center;
            margin-bottom: 35px;
        }

        h2 {
            color: var(--text-main);
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h2 i {
            color: var(--primary-color);
            background: var(--primary-light);
            padding: 10px;
            border-radius: var(--radius);
            font-size: 24px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Khu vực hiển thị thông số nhanh (Counter Widgets) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            padding: 14px 18px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .stat-icon.keyword { background: var(--primary-light); color: var(--primary-color); }
        .stat-icon.result { background: var(--success-bg); color: var(--success-color); }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .stat-value { font-size: 16px; font-weight: 700; color: var(--text-main); }

        /* Bố cục vùng nhập liệu */
        .vung {
            margin-bottom: 28px;
        }

        label {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: #334155;
            font-size: 14px;
        }

        label i {
            font-size: 16px;
            color: var(--primary-color);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: #fff;
            color: var(--text-main);
            font-family: inherit;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
            outline: none;
        }

        textarea {
            resize: vertical;
            line-height: 1.6;
        }

        /* Tiêu đề kết quả & Nút bấm sao chép */
        .ket-qua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        #btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        #btn-copy:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.3);
        }

        #btn-copy:active:not(:disabled) {
            transform: translateY(0);
        }

        #btn-copy:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Khung hiển thị kết quả dạng dữ liệu code sạch sẽ */
        .ket-qua-container {
            border: 1px solid #cbd5e1;
            border-radius: var(--radius);
            background-color: #f8fafc;
            overflow: hidden;
        }

        #ket-qua {
            min-height: 80px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'JetBrains Mono', Fira Code, Consolas, monospace;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            line-height: 1.6;
        }

        /* Các trạng thái rỗng / lỗi */
        .empty-state {
            color: var(--text-muted);
            font-style: italic;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 400;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--danger-color);
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            background: var(--danger-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-title">
        <h2><i class="fa-solid fa-chart-line"></i> BỘ LỌC DỮ LIỆU PMH</h2>
        <p class="subtitle">Báo cáo chỉ số và trích xuất chuỗi thông tin tự động</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon keyword"><i class="fa-solid fa-terminal"></i></div>
            <div class="stat-info">
                <span class="stat-label">Từ khóa đang tìm</span>
                <span class="stat-value" id="stat-kw-text">Chưa nhập</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon result"><i class="fa-solid fa-list-check"></i></div>
            <div class="stat-info">
                <span class="stat-label">Số dòng lọc được</span>
                <span class="stat-value" id="stat-res-count">0 dòng</span>
            </div>
        </div>
    </div>

    <div class="vung">
        <label for="tim-kiem"><i class="fa-solid fa-magnifying-glass"></i> Vùng 1: Từ khóa tìm kiếm</label>
        <input type="text" id="tim-kiem" placeholder="Nhập ký tự, mã số, tên cần tìm tại đây..." oninput="locDuLieu()">
    </div>

    <div class="vung">
        <label for="input-data"><i class="fa-solid fa-database"></i> Vùng 2: Nhập hoặc Dán chuỗi Data dữ liệu gốc</label>
        <textarea id="input-data" rows="8" placeholder="Dán toàn bộ dữ liệu của bạn vào đây..." oninput="locDuLieu()"></textarea>
    </div>

    <div class="vung">
        <div class="ket-qua-header">
            <label style="margin-bottom: 0;"><i class="fa-solid fa-square-poll-horizontal"></i> Vùng 3: Kết quả lọc được</label>
            <button id="btn-copy" onclick="copyTatCa()" disabled>
                <i class="fa-solid fa-copy"></i> Copy All
            </button>
        </div>
        <div class="ket-qua-container">
            <div id="ket-qua" style="padding: 20px;">
                <span class="empty-state"><i class="fa-solid fa-circle-nodes"></i> Hệ thống đang chờ bạn nhập dữ liệu và từ khóa...</span>
            </div>
        </div>
    </div>
</div>

<script>
let kếtQuảHiệnTại = [];

function locDuLieu() {
    const tuKhoaRaw = document.getElementById('tim-kiem').value;
    const tuKhoa = tuKhoaRaw.trim().toLowerCase();
    const dataGoc = document.getElementById('input-data').value;
    const vungKetQua = document.getElementById('ket-qua');
    const btnCopy = document.getElementById('btn-copy');
    
    // Element cập nhật Widget thống kê
    const statKwText = document.getElementById('stat-kw-text');
    const statResCount = document.getElementById('stat-res-count');

    // Cập nhật text từ khóa lên Widget realtime
    statKwText.textContent = tuKhoaRaw.trim() ? `"${tuKhoaRaw.trim()}"` : "Chưa nhập";

    if (!dataGoc || !tuKhoa) {
        vungKetQua.innerHTML = '<span class="empty-state"><i class="fa-solid fa-circle-nodes"></i> Hệ thống đang chờ bạn nhập dữ liệu và từ khóa...</span>';
        btnCopy.disabled = true;
        kếtQuảHiệnTại = [];
        statResCount.textContent = "0 dòng";
        return;
    }

    const cacKhoi = dataGoc.split(/━━━━━━+/);
    kếtQuảHiệnTại = [];

    cacKhoi.forEach(khoi => {
        const cacDong = khoi.split('\n').map(d => d.trim()).filter(d => d !== "");
        
        if (cacDong.length >= 2) {
            const dongThongTin = cacDong[0].toLowerCase();
            const dongMuiTen = cacDong[1];

            if (dongThongTin.includes(tuKhoa) && dongMuiTen.startsWith('➜')) {
                kếtQuảHiệnTại.push(dongMuiTen);
            }
        }
    });

    // Cập nhật số lượng đếm lên Widget đầu ra
    statResCount.textContent = `${kếtQuảHiệnTại.length} dòng`;

    if (kếtQuảHiệnTại.length > 0) {
        vungKetQua.innerText = kếtQuảHiệnTại.join('\n');
        btnCopy.disabled = false;
    } else {
        vungKetQua.innerHTML = "<div class='error-container'><i class='fa-solid fa-triangle-exclamation'></i> Không tìm thấy kết quả nào trùng khớp!</div>";
        btnCopy.disabled = true;
    }
}

function copyTatCa() {
    if (kếtQuảHiệnTại.length === 0) return;

    const vanBanCopy = kếtQuảHiệnTại.join('\n');

    navigator.clipboard.writeText(vanBanCopy).then(() => {
        const btnCopy = document.getElementById('btn-copy');
        
        btnCopy.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép!';
        btnCopy.style.backgroundColor = "#10b981"; /* Đổi sang xanh lục khi copy thành công */
        btnCopy.style.boxShadow = "0 4px 12px rgba(16, 185, 129, 0.3)";
        
        setTimeout(() => {
            btnCopy.innerHTML = '<i class="fa-solid fa-copy"></i> Copy All';
            btnCopy.style.backgroundColor = "var(--primary-color)";
            btnCopy.style.boxShadow = "0 4px 12px rgba(14, 165, 233, 0.2)";
        }, 1500);
    }).catch(err => {
        alert('Lỗi khi sao chép: ', err);
    });
}
</script>

</body>
</html>
