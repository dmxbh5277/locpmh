<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lọc Dữ Liệu PMH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --success-color: #2b6cb0;
            --danger-color: #e53e3e;
            --danger-hover: #c53030;
            --bg-body: #f4f7fc;
            --bg-card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --success-bg: #ebf8ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.08);
            box-sizing: border-box;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 5px;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .vung {
            margin-bottom: 20px;
        }

        .vung-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 600;
            display: block;
            color: #4a5568;
            font-size: 14px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            color: var(--text-main);
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.15);
            outline: none;
        }

        textarea {
            resize: vertical;
            font-family: inherit;
        }

        .btn-phu {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-phu:hover {
            background-color: var(--danger-color);
            color: white;
        }

        .ket-qua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 6px rgba(0, 102, 204, 0.15);
        }

        #btn-copy:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        #btn-copy.copied {
            background-color: var(--success-color) !important;
        }

        #btn-copy:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        #ket-qua {
            background-color: var(--success-bg);
            border: 2px dashed #90cdf4;
            border-radius: 10px;
            min-height: 60px;
            white-space: pre-line;
            font-family: SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px; 
            font-weight: 600;
            color: #2b6cb0;
            box-sizing: border-box;
            word-break: break-all;
        }

        .empty-state {
            color: var(--text-muted);
            font-style: italic;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 14px;
        }
        
        .error-state {
            color: #e53e3e;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        @media (min-width: 768px) {
            body { padding: 40px 20px; }
            .container { padding: 35px; }
            h2 { font-size: 26px; }
            #ket-qua { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-filter"></i> BỘ LỌC DỮ LIỆU PMH</h2>

    <div class="vung">
        <div class="vung-header">
            <label for="tim-kiem"><i class="fa-solid fa-magnifying-glass" style="color: var(--primary-color); margin-right: 5px;"></i> Vùng 1: Từ khóa tìm kiếm (Cách nhau bằng dấu phẩy ",")</label>
        </div>
        <input type="text" id="tim-kiem" placeholder="Ví dụ: 43773, 111404, Boss..." oninput="luuVaLocDuLieu()">
    </div>

    <div class="vung">
        <div class="vung-header">
            <label for="input-data"><i class="fa-solid fa-clipboard-list" style="color: var(--primary-color); margin-right: 5px;"></i> Vùng 2: Nhập hoặc Dán chuỗi Data dữ liệu gốc</label>
            <button class="btn-phu" onclick="xoaData()"><i class="fa-solid fa-trash-can"></i> Xóa Data</button>
        </div>
        <textarea id="input-data" rows="7" placeholder="Dán toàn bộ dữ liệu của bạn vào đây..." oninput="locDuLieu()"></textarea>
    </div>

    <div class="vung">
        <div class="ket-qua-header">
            <label style="margin-bottom: 0;"><i class="fa-solid fa-square-poll-horizontal" style="color: var(--primary-color); margin-right: 5px;"></i> Vùng 3: Kết quả lọc được</label>
            <button id="btn-copy" onclick="copyTatCa()" disabled>
                <i class="fa-solid fa-copy"></i> Copy All
            </button>
        </div>
        <div id="ket-qua" style="padding: 15px;">
            <span class="empty-state">Hệ thống đang chờ bạn nhập dữ liệu và từ khóa...</span>
        </div>
    </div>
</div>

<script>
let ketQuaHienTai = [];

// Khôi phục từ khóa khi tải lại trang (F5)
window.onload = function() {
    const tuKhoaDaLuu = localStorage.getItem('tuKhoaPMH');
    if (tuKhoaDaLuu) {
        document.getElementById('tim-kiem').value = tuKhoaDaLuu;
        locDuLieu();
    }
}

function luuVaLocDuLieu() {
    const giaTriTimKiem = document.getElementById('tim-kiem').value;
    localStorage.setItem('tuKhoaPMH', giaTriTimKiem); // Lưu chuỗi thô người dùng gõ
    locDuLieu();
}

function xoaData() {
    const inputData = document.getElementById('input-data');
    inputData.value = '';
    inputData.focus();
    locDuLieu();
}

function locDuLieu() {
    const tuKhoaInput = document.getElementById('tim-kiem').value;
    const dataGoc = document.getElementById('input-data').value;
    const vungKetQua = document.getElementById('ket-qua');
    const btnCopy = document.getElementById('btn-copy');

    // Tách chuỗi từ khóa bằng dấu phẩy, làm sạch khoảng trắng và lọc bỏ các từ khóa rỗng
    const danhSachTuKhoa = tuKhoaInput.split(',')
                                     .map(tk => tk.trim().toLowerCase().replace(/\s+/g, ' '))
                                     .filter(tk => tk !== "");

    if (!dataGoc.trim() || danhSachTuKhoa.length === 0) {
        vungKetQua.innerHTML = '<span class="empty-state">Hệ thống đang chờ bạn nhập dữ liệu và từ khóa...</span>';
        btnCopy.disabled = true;
        ketQuaHienTai = [];
        return;
    }

    const cacKhoi = dataGoc.split(/━{3,}/);
    ketQuaHienTai = [];

    cacKhoi.forEach(khoi => {
        const cacDong = khoi.split(/\r?\n/).map(d => d.trim()).filter(d => d !== "");
        
        if (cacDong.length >= 2) {
            const dongThongTin = cacDong[0].toLowerCase();
            const dongMuiTen = cacDong[1];

            // Kiểm tra xem dòng thông tin có chứa ÍT NHẤT MỘT từ khóa trong danh sách không
            const timThay = danhSachTuKhoa.some(tuKhoa => dongThongTin.includes(tuKhoa));

            if (timThay && dongMuiTen.startsWith('➜')) {
                ketQuaHienTai.push(dongMuiTen);
            }
        }
    });

    if (ketQuaHienTai.length > 0) {
        vungKetQua.textContent = ketQuaHienTai.join('\n');
        btnCopy.disabled = false;
    } else {
        vungKetQua.innerHTML = "<span class='error-state'>❌ Không tìm thấy kết quả nào trùng khớp!</span>";
        btnCopy.disabled = true;
    }
}

function copyTatCa() {
    if (ketQuaHienTai.length === 0) return;

    const vanBanCopy = ketQuaHienTai.join('\n');

    navigator.clipboard.writeText(vanBanCopy).then(() => {
        const btnCopy = document.getElementById('btn-copy');
        btnCopy.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép!';
        btnCopy.classList.add('copied');
        
        setTimeout(() => {
            btnCopy.innerHTML = '<i class="fa-solid fa-copy"></i> Copy All';
            btnCopy.classList.remove('copied');
        }, 1500);
    }).catch(err => {
        console.error('Lỗi khi sao chép: ', err);
        alert('Không thể sao chép tự động. Vui lòng chọn và copy thủ công.');
    });
}
</script>

</body>
</html>
